services:
  - type: web
    name: vyapaar
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: metadataloop_db
          property: connectionString
      - key: FYERS_REDIRECT_URI
        value: https://vyapaar.onrender.com/fyers/callback
      - key: APP_BASE_URL
        value: https://vyapaar.onrender.com
      - key: TIMEZONE
        value: Asia/Kolkata